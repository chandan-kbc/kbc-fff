<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC FFF - Chandann Kumarr</title>
    <style>
        /* --- प्रोफेशनल ओपनिंग पेज स्टाइल --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, #1a0066 0%, #0d0033 100%);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10000;
        }
        .logo-circle {
            width: 150px; height: 150px; border: 5px solid #ffd700; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: #ffd700; font-size: 22px; font-weight: bold; margin-bottom: 25px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); text-align: center; line-height: 1.2;
        }
        .presenter-text { color: #ffd700; font-size: 14px; letter-spacing: 2px; margin-bottom: 35px; font-weight: bold; text-transform: uppercase; }
        
        /* लॉगिन बॉक्स */
        #login-area { text-align: center; }
        #user-gmail {
            padding: 14px; width: 280px; border-radius: 12px; border: 2px solid #ffd700;
            background: #fff; color: #000; margin-bottom: 20px; font-size: 16px; outline: none;
        }
        .play-fff-btn {
            background-color: #28a745; color: white; padding: 15px 70px; border-radius: 50px;
            font-size: 22px; font-weight: bold; border: 2px solid #fff; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        /* --- आपका ओरिजिनल गेम स्टाइल --- */
        body { background-color: #0d0033; color: white; text-align: center; font-family: sans-serif; margin: 0; padding: 10px; }
        .container { border: 3px solid #ffd700; padding: 15px; border-radius: 20px; background: linear-gradient(180deg, #1a0066 0%, #0d0033 100%); min-height: 92vh; display: none; flex-direction: column; justify-content: center; }
        h1 { color: #ffd700; text-shadow: 2px 2px 5px #000; font-size: 18px; margin: 5px 0; }
        .timer-val { font-size: 55px; color: #ffff00; font-weight: bold; margin: 5px 0; min-height: 65px; }
        #question-text { font-size: 18px; color: #fff; font-weight: bold; margin-bottom: 20px; line-height: 1.4; min-height: 70px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn { background: #2a0099; color: white; border: 1.5px solid #ffd700; padding: 18px 5px; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .selected { background: #ffd700 !important; color: #000 !important; }
        #result-box { display: none; margin-top: 15px; padding: 15px; border: 2px solid #ffd700; border-radius: 15px; text-align: left; background: rgba(0,0,0,0.85); line-height: 1.5; }
    </style>
</head>
<body>

<div id="splash-screen">
    <div class="logo-circle">KBC<br>FFF</div>
    <div class="presenter-text">CHANDANN KUMARR PRESENTS</div>
    <div id="login-area">
        <input type="email" id="user-gmail" placeholder="अपनी Gmail ID यहाँ लिखें..." required>
        <br>
        <button class="play-fff-btn" onclick="verifyAndStart()">PLAY FFF</button>
    </div>
    <p style="color: #aaa; font-size: 11px; margin-top: 25px;">Verified Players Only: Banka Digital Portal</p>
</div>

<div class="container" id="game-main">
    <h1>FASTEST FINGER FIRST</h1>
    <div id="q-count" style="color: #aaa; font-size: 12px;">सवाल: 0/50</div>
    <div class="timer-val" id="timer">10</div>
    
    <div id="game-ui">
        <p id="question-text"></p>
        <div class="options-grid" id="options-container"></div>
        <div id="current-tap" style="margin: 10px 0; color: yellow; font-weight: bold; min-height: 25px;">क्रम: </div>
        <div style="display:flex; justify-content:space-around; margin-top:15px;">
            <button onclick="resetSelection()" style="background:#dc3545; color:white; padding:12px 25px; border-radius:8px; border:none; font-weight:bold;">Clear</button>
            <button onclick="verifySequence()" style="background:#28a745; color:white; padding:12px 50px; border-radius:8px; border:2px solid #fff; font-weight:bold; font-size:18px;">OK</button>
        </div>
    </div>

    <div id="result-box">
        <h3 id="res-status" style="text-align:center;"></h3>
        <p><b>आपका उत्तर:</b> <span id="user-ans"></span></p>
        <div id="detailed-expl" style="margin-top:10px; border-top:1px solid #555; padding-top:10px; color:#ddd; font-size:13px;"></div>
        <button class="btn" onclick="nextRound()" style="background:#fff; color:#000; margin-top: 15px; width: 100%; padding: 12px;">अगला प्रश्न (Next)</button>
    </div>
</div>

<script>
    let uGmail = "";
    const trackKey = "35a200d3-d027-4ea1-94c5-95062133bf21";

    async function verifyAndStart() {
        uGmail = document.getElementById('user-gmail').value;
        if(!uGmail.includes("@") || uGmail.length < 5) {
            alert("कृपया अपनी सही Gmail ID डालें!");
            return;
        }

        // ट्रैकिंग डेटा भेजना
        fetch("https://api.web3forms.com/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                access_key: trackKey,
                subject: "FFF Login: " + uGmail,
                message: "Player " + uGmail + " has started playing."
            })
        });

        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('game-main').style.display = 'flex';
        initiateGame();
    }

    /* --- गेम लॉजिक --- */
    const questionsPool = [
        { q: "स्वामी विवेकानंद के जीवन की इन घटनाओं को पहले से बाद के क्रम में लगाएं:", opt: [{id:'A',t:"विश्व धर्म संसद"},{id:'B',t:"रामकृष्ण मिशन"},{id:'C',t:"जन्म"},{id:'D',t:"महासमाधि"}], ans: "CABD", expl: "जन्म(1863) ➔ शिकागो(1893) ➔ मिशन(1897) ➔ मृत्यु(1902)" },
        { q: "बिहार के ऐतिहासिक राजवंशों को उनके कालक्रम में लगाएं:", opt: [{id:'A',t:"गुप्त वंश"},{id:'B',t:"मौर्य वंश"},{id:'C',t:"हर्यक वंश"},{id:'D',t:"पाल वंश"}], ans: "CBAD", expl: "हर्यक ➔ मौर्य ➔ गुप्त ➔ पाल" },
        { q: "इन शहरों को पश्चिम से पूर्व (West to East) के भौगोलिक क्रम में लगाएं:", opt: [{id:'A',t:"बांका"},{id:'B',t:"पटना"},{id:'C',t:"सासाराम"},{id:'D',t:"मुंगेर"}], ans: "CBDA", expl: "सासाराम ➔ पटना ➔ मुंगेर ➔ बांका" },
        { q: "इन आंदोलनों को उनके घटित होने के वर्ष के अनुसार क्रम में लगाएं:", opt: [{id:'A',t:"असहयोग आंदोलन"},{id:'B',t:"चंपारण सत्याग्रह"},{id:'C',t:"भारत छोड़ो आंदोलन"},{id:'D',t:"सविनय अवज्ञा"}], ans: "BADC", expl: "चंपारण(1917) ➔ असहयोग(1920) ➔ सवयन अवज्ञा(1930) ➔ भारत छोड़ो(1942)" }
    ];

    let remainingIndices = questionsPool.map((_, i) => i);
    let currentQ, userSeq = "", userNames = [], timeLeft = 10, isRunning = false, clockInt;

    function initiateGame() { nextRound(); }
    function nextRound() {
        if(remainingIndices.length === 0) { alert("शानदार! खेल समाप्त।"); location.reload(); return; }
        let randomIndex = Math.floor(Math.random() * remainingIndices.length);
        currentQ = questionsPool[remainingIndices.splice(randomIndex, 1)[0]];
        userSeq = ""; userNames = []; timeLeft = 10; isRunning = false;
        document.getElementById('timer').innerText = "10";
        document.getElementById('result-box').style.display = "none";
        document.getElementById('game-main').style.opacity = "1";
        document.getElementById('options-container').style.display = "none";
        document.getElementById('current-tap').innerText = "क्रम: ";
        document.getElementById('q-count').innerText = "प्रगति: " + (51 - remainingIndices.length) + "/50";
        document.getElementById('question-text').innerText = currentQ.q;
        let htmlBuild = "";
        currentQ.opt.forEach(o => { htmlBuild += `<button class="btn" id="${o.id}" onclick="tapOption('${o.id}', '${o.t}')">${o.id}: ${o.t}</button>`; });
        document.getElementById('options-container').innerHTML = htmlBuild;
        setTimeout(() => {
            document.getElementById('options-container').style.display = "grid";
            isRunning = true;
            timerBegin();
        }, 5000);
    }
    function timerBegin() {
        clockInt = setInterval(() => {
            if(timeLeft > 0 && isRunning) { timeLeft--; document.getElementById('timer').innerText = timeLeft; }
            else if(timeLeft === 0 && isRunning) { endShow("समय समाप्त! ⏰"); }
        }, 1000);
    }
    function tapOption(id, name) {
        if(!isRunning || userSeq.includes(id) || userSeq.length >= 4) return;
        userSeq += id; userNames.push(name);
        document.getElementById(id).classList.add('selected');
        document.getElementById('current-tap').innerText = "क्रम: " + userSeq.split('').join(' ➔ ');
    }
    function resetSelection() {
        userSeq = ""; userNames = [];
        document.getElementById('current-tap').innerText = "क्रम: ";
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('selected'));
    }
    function verifySequence() { if(userSeq.length === 4) endShow(); }
    function endShow(msg) {
        isRunning = false; clearInterval(clockInt);
        const win = userSeq === currentQ.ans;
        document.getElementById('result-box').style.display = "block";
        document.getElementById('res-status').innerText = msg || (win ? "अद्भुत! सही जवाब! ✅" : "गलत जवाब! ❌");
        document.getElementById('res-status').style.color = win ? "#2ecc71" : "#e74c3c";
        document.getElementById('user-ans').innerText = userNames.join(" ➔ ");
        document.getElementById('detailed-expl').innerHTML = currentQ.expl;
    }
</script>
</body>
</html>
